name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  beta_handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run beta handoff gate
        env:
          FLUTTER_BIN: flutter
        run: ./tool/beta_handoff.sh

      - name: Upload web build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: production-chat-prop-web
          path: build/web
          if-no-files-found: error
